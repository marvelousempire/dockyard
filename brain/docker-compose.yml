# Dockyard — dedicated agent brain (Postgres + pgvector)
# Provisioned by Bishop birth kit. Full template: dockyard/brain-template (Plan 0043)
name: dockyard-brain

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dockyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dockyard}
      POSTGRES_DB: ${POSTGRES_DB:-dockyard_brain}
    volumes:
      - brain_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    ports:
      - "${BRAIN_HOST_PORT:-39584}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dockyard} -d ${POSTGRES_DB:-dockyard_brain}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  brain_data:
