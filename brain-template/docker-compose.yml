# {{display_name}} — dedicated agent brain (Postgres + pgvector)
# Canonical template: dockyard/brain-template (Nephew Plan 0043)
name: {{compose_project}}

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-{{agent_name}}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-{{agent_name}}}
      POSTGRES_DB: ${POSTGRES_DB:-{{agent_name}}_brain}
    volumes:
      - brain_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    ports:
      - "${BRAIN_HOST_PORT:-{{brain_port}}}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-{{agent_name}}} -d ${POSTGRES_DB:-{{agent_name}}_brain}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  brain_data:
